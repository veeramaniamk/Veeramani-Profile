<!-- Scroll Progress Bar -->
<div class="scroll-progress" [style.width.%]="scrollPercent"></div>

<header class="navbar-wrapper" [class.scrolled]="isScrolled">
  <div class="container navbar-container">
    <!-- Brand Logo -->
    <a href="#" class="logo" (click)="$event.preventDefault(); scrollToSection('hero')">
      V<span>eeramani</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      @for (link of navLinks; track link.target) {
        <a class="nav-link" (click)="scrollToSection(link.target)">
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- Right Side Actions: Theme & Mobile Toggle -->
    <div class="nav-actions">
      <!-- Dark/Light Mode toggle button -->
      <button class="theme-toggle" (click)="themeService.toggleTheme()" aria-label="Toggle Theme">
        <!-- Sun icon (shown when theme is dark) -->
        @if (themeService.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        } @else {
          <!-- Moon icon (shown when theme is light) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>

      <!-- Hamburger mobile button -->
      <button class="mobile-toggle" [class.open]="isMobileMenuOpen" (click)="toggleMobileMenu()" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Navigation Overlay -->
<div class="mobile-overlay" [class.open]="isMobileMenuOpen">
  <nav class="mobile-nav">
    @for (link of navLinks; track link.target) {
      <a class="mobile-nav-link" (click)="scrollToSection(link.target)">
        {{ link.label }}
      </a>
    }
  </nav>
</div>
