<section id="experience" class="experience-section">
  <div class="container">
    <!-- Header -->
    <div class="section-header" appScrollReveal revealClass="reveal-up">
      <span class="sub-title">My Journey</span>
      <h2 class="section-title">Experience & Focus</h2>
      <div class="title-underline"></div>
    </div>

    <!-- Timeline Wrapper -->
    <div class="timeline-wrapper">
      <div class="timeline-line"></div>

      @for (item of timeline; track item.role; let idx = $index) {
        <div 
          class="timeline-item" 
          [class.left-item]="idx % 2 === 0" 
          [class.right-item]="idx % 2 !== 0"
          appScrollReveal 
          [revealClass]="idx % 2 === 0 ? 'reveal-left' : 'reveal-right'">
          
          <!-- Node Dot -->
          <div class="timeline-node" [style.background]="item.color" [style.box-shadow]="'0 0 0 4px var(--bg-primary), 0 0 15px ' + item.color">
            @if (item.icon === 'smartphone') {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
            } @else if (item.icon === 'server') {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
            }
          </div>

          <!-- Content Card -->
          <div class="timeline-content-wrapper">
            <div class="timeline-content glass-card">
              <span class="item-category" [style.color]="item.color">{{ item.category }}</span>
              <h3 class="item-role">{{ item.role }}</h3>
              
              <ul class="item-points">
                @for (point of item.points; track point) {
                  <li>
                    <svg class="point-tick" [style.color]="item.color" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span>{{ point }}</span>
                  </li>
                }
              </ul>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
